
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DotaStats</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0c;
  --s1: #141414;
  --s2: #1a1a1a;
  --s3: #222222;
  --border: #2a2a2a;
  --text: #c0c0c0;
  --bright: #e8e8e8;
  --muted: #555;
  --win: #4a9e6a;
  --lose: #9e4a4a;
  --accent: #5566aa;
  --radius: 4px;
}

body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

/* SEARCH */
#searchPage {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; gap: 12px;
}

.logo { font-size: 24px; font-weight: 700; color: var(--bright); letter-spacing: 3px; text-transform: uppercase; }
.logo em { color: var(--accent); font-style: normal; }
.tagline { color: var(--muted); font-size: 12px; letter-spacing: 0.5px; margin-bottom: 8px; }

.search-box {
  display: flex; width: 440px;
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; background: var(--s1);
}

.search-box input {
  flex: 1; background: transparent; border: none;
  padding: 11px 14px; color: var(--bright); font-size: 13px; outline: none;
}

.search-box input::placeholder { color: var(--muted); }

.search-box button {
  background: var(--accent); border: none; padding: 11px 18px;
  color: #fff; font-size: 12px; font-weight: 700; cursor: pointer;
  letter-spacing: 1px; transition: opacity 0.15s;
}

.search-box button:hover { opacity: 0.85; }
.search-box button:disabled { opacity: 0.4; cursor: not-allowed; }
.err { color: var(--lose); font-size: 12px; }

/* PROFILE */
#profilePage { display: none; }

.topbar {
  background: var(--s1); border-bottom: 1px solid var(--border);
  padding: 0 20px; display: flex; align-items: center; height: 44px; gap: 12px;
}

.topbar-logo { font-size: 14px; font-weight: 700; color: var(--bright); letter-spacing: 2px; }
.topbar-logo em { color: var(--accent); font-style: normal; }

.back-btn {
  margin-left: auto; background: transparent;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 4px 10px; color: var(--muted); font-size: 11px;
  cursor: pointer; transition: color 0.15s;
}

.back-btn:hover { color: var(--text); }

/* Profile header */
.pheader {
  background: var(--s1); border-bottom: 1px solid var(--border);
  padding: 16px 20px;
}

.pheader-inner { max-width: 1060px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }

.avatar { width: 52px; height: 52px; border-radius: var(--radius); object-fit: cover; background: var(--s3); flex-shrink: 0; }

.pname { font-size: 18px; font-weight: 700; color: var(--bright); margin-bottom: 4px; }

.pbadges { display: flex; gap: 8px; }

.badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 2px; letter-spacing: 0.5px; border: 1px solid;
}

.badge-rank { color: #8888cc; border-color: #333366; background: rgba(85,102,170,0.1); }

/* Content */
.content { max-width: 1060px; margin: 0 auto; padding: 16px 20px; }

/* Filter */
.filters { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
.filters span { color: var(--muted); font-size: 11px; letter-spacing: 0.5px; }

.fbtn {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px 10px; color: var(--muted);
  font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s;
}

.fbtn.on { background: rgba(85,102,170,0.15); border-color: #334488; color: #8899dd; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }

.scard {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}

.slabel { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
.sval { font-size: 26px; font-weight: 700; line-height: 1; color: var(--bright); }
.ssub { font-size: 11px; color: var(--muted); margin-top: 4px; }

.wbar { height: 2px; background: var(--s3); border-radius: 1px; margin-top: 8px; overflow: hidden; }
.wfill { height: 100%; background: var(--win); border-radius: 1px; transition: width 0.5s; }

/* Section */
.sec { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* Heroes */
.hgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }

.hcard {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px;
  display: flex; gap: 10px; align-items: center;
}

.himg { width: 38px; height: 21px; border-radius: 2px; object-fit: cover; background: var(--s3); flex-shrink: 0; }

.hinfo { flex: 1; min-width: 0; }
.hname { font-size: 12px; font-weight: 600; color: var(--bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.hmeta { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
.hwr { font-weight: 700; }
.hwr.g { color: var(--win); }
.hwr.b { color: var(--lose); }
.hwr.n { color: #aa8833; }
.hbarw { height: 2px; background: var(--s3); border-radius: 1px; margin-top: 4px; overflow: hidden; }
.hbarf { height: 100%; border-radius: 1px; transition: width 0.5s; }

/* Matches */
.mtable { width: 100%; border-collapse: collapse; }
.mtable tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
.mtable tr:hover { background: var(--s1); }
.mtable td { padding: 9px 8px; vertical-align: middle; }

.rtag {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 2px; letter-spacing: 0.5px; border: 1px solid;
}

.rtag.w { color: var(--win); background: rgba(74,158,106,0.1); border-color: rgba(74,158,106,0.25); }
.rtag.l { color: var(--lose); background: rgba(158,74,74,0.1); border-color: rgba(158,74,74,0.25); }

.mhero { display: flex; align-items: center; gap: 8px; }
.mhimg { width: 34px; height: 19px; border-radius: 2px; object-fit: cover; background: var(--s3); flex-shrink: 0; }
.mhname { font-size: 12px; font-weight: 600; color: var(--bright); }
.mdate { font-size: 10px; color: var(--muted); margin-top: 1px; }
.mkda { font-size: 12px; font-weight: 600; color: var(--bright); text-align: center; white-space: nowrap; }
.mkda .d { color: var(--muted); font-weight: 400; }
.mdur { font-size: 11px; color: var(--muted); text-align: right; }
.mid { font-size: 10px; color: #333; text-align: right; }
</style>
</head>
<body>

<div id="searchPage">
  <div class="logo">Dota<em>Stats</em></div>
  <div class="tagline">Статистика по последним матчам</div>
  <div class="search-box">
    <input id="inp" type="text" placeholder="Steam Account ID (например 1141826708)">
    <button id="sbtn" onclick="search()">НАЙТИ</button>
  </div>
  <div class="err" id="err"></div>
</div>

<div id="profilePage">
  <div class="topbar">
    <div class="topbar-logo">Dota<em>Stats</em></div>
    <button class="back-btn" onclick="back()">← Новый поиск</button>
  </div>

  <div class="pheader">
    <div class="pheader-inner">
      <img class="avatar" id="ava" src="" alt="">
      <div>
        <div class="pname" id="pname"></div>
        <div class="pbadges">
          <span class="badge badge-rank" id="prank"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="filters">
      <span>МАТЧЕЙ:</span>
      <button class="fbtn on" onclick="setN(30,this)">30</button>
      <button class="fbtn" onclick="setN(100,this)">100</button>
    </div>

    <div class="stats">
      <div class="scard">
        <div class="slabel">Процент побед</div>
        <div class="sval" id="swr" style="color:var(--win)"></div>
        <div class="ssub" id="swl"></div>
        <div class="wbar"><div class="wfill" id="wf"></div></div>
      </div>
      <div class="scard">
        <div class="slabel">KDA (средний)</div>
        <div class="sval" id="skda" style="color:#8899dd"></div>
        <div class="ssub">Kills + Assists / Deaths</div>
      </div>
      <div class="scard">
        <div class="slabel">Матчей</div>
        <div class="sval" id="sgames" style="color:var(--bright)"></div>
        <div class="ssub" id="speriod"></div>
      </div>
    </div>

    <div class="sec">Топ герои</div>
    <div class="hgrid" id="hgrid"></div>

    <div class="sec">Последние матчи</div>
    <table class="mtable"><tbody id="mlist"></tbody></table>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
const CDN = 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes';

const RANKS = {
  11:'Рекрут I',12:'Рекрут II',13:'Рекрут III',14:'Рекрут IV',15:'Рекрут V',
  21:'Страж I',22:'Страж II',23:'Страж III',24:'Страж IV',25:'Страж V',
  31:'Рыцарь I',32:'Рыцарь II',33:'Рыцарь III',34:'Рыцарь IV',35:'Рыцарь V',
  41:'Герой I',42:'Герой II',43:'Герой III',44:'Герой IV',45:'Герой V',
  51:'Легенда I',52:'Легенда II',53:'Легенда III',54:'Легенда IV',55:'Легенда V',
  61:'Властелин I',62:'Властелин II',63:'Властелин III',64:'Властелин IV',65:'Властелин V',
  71:'Титан I',72:'Титан II',73:'Титан III',74:'Титан IV',75:'Титан V',
  81:'Бож I',82:'Бож II',83:'Бож III',84:'Бож IV',85:'Бож V',
  90:'Бессмертный'
};

let data = null;
let N = 30;

function fmt(s) { const m=Math.floor(s/60),sc=s%60; return `${m}:${sc.toString().padStart(2,'0')}`; }
function dt(ts) { return new Date(ts*1000).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}); }
function cap(s) { return s ? s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : ''; }

async function search() {
  const id = document.getElementById('inp').value.trim();
  if (!id) return;
  const btn = document.getElementById('sbtn');
  const err = document.getElementById('err');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const r = await fetch(`${API}/player/${id}`);
    if (!r.ok) throw new Error('Игрок не найден');
    const json = await r.json();
    console.log('matches:', json.matches?.length, 'first hero_icon:', json.matches?.[0]?.hero_icon);
    // Проверяем что данные корректные
    if (!json.matches || json.matches.length === 0) throw new Error('Нет данных');
    data = json;
    N = 30;
    document.querySelectorAll('.fbtn').forEach((b,i) => b.classList.toggle('on', i===0));
    render();
    document.getElementById('searchPage').style.display = 'none';
    document.getElementById('profilePage').style.display = 'block';
  } catch(e) {
    err.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'НАЙТИ';
  }
}

function setN(n, btn) {
  N = n;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render() {
  if (!data) return;
  const profile = data.info?.profile || {};
  const matches = (data.matches || []).slice(0, N);

  // Header
  document.getElementById('ava').src = profile.avatarfull || '';
  document.getElementById('pname').textContent = profile.personaname || '—';
  document.getElementById('prank').textContent = RANKS[data.info?.rank_tier] || 'Неизвестный ранг';

  // Пересчёт статистики для N матчей
  let wins = 0, tk = 0, td = 0, ta = 0;
  matches.forEach(m => {
    const rad = m.player_slot < 128;
    const won = (rad && m.radiant_win) || (!rad && !m.radiant_win);
    if (won) wins++;
    tk += m.kills;
    td += m.deaths;
    ta += m.assists;
  });
  const losses = matches.length - wins;
  const wr = matches.length ? Math.round(wins/matches.length*100) : 0;
  const kda = td ? Math.round((tk+ta)/td*10)/10 : (tk+ta);

  document.getElementById('swr').textContent = wr + '%';
  document.getElementById('swl').textContent = `${wins}В — ${losses}П`;
  document.getElementById('wf').style.width = wr + '%';
  document.getElementById('skda').textContent = kda;
  document.getElementById('sgames').textContent = matches.length;
  document.getElementById('speriod').textContent = `показано из ${data.matches.length}`;

  // Герои — пересчёт из текущего среза
  const hmap = {};
  matches.forEach(m => {
    const key = m.hero_icon || String(m.hero_id);
    if (!hmap[key]) hmap[key] = {icon: m.hero_icon, games:0, wins:0};
    hmap[key].games++;
    const rad = m.player_slot < 128;
    if ((rad && m.radiant_win)||(!rad && !m.radiant_win)) hmap[key].wins++;
  });

  const top = Object.values(hmap).sort((a,b)=>b.games-a.games).slice(0,3);
  document.getElementById('hgrid').innerHTML = top.map(h => {
    const wr2 = Math.round(h.wins/h.games*100);
    const cls = wr2>=60?'g':wr2>=45?'n':'b';
    const clr = wr2>=60?'var(--win)':wr2>=45?'#aa8833':'var(--lose)';
    const name = cap(h.icon) || `Герой`;
    return `<div class="hcard">
      <img class="himg" src="${CDN}/${h.icon||'antimage'}.png" onerror="this.style.opacity=0" alt="">
      <div class="hinfo">
        <div class="hname">${name}</div>
        <div class="hmeta"><span>${h.games} игр</span><span class="hwr ${cls}">${wr2}%</span></div>
        <div class="hbarw"><div class="hbarf" style="width:${wr2}%;background:${clr}"></div></div>
      </div>
    </div>`;
  }).join('');

  // Матчи
  document.getElementById('mlist').innerHTML = matches.map(m => {
    const rad = m.player_slot < 128;
    const won = (rad && m.radiant_win)||(!rad && !m.radiant_win);
    const hname = cap(m.hero_icon) || `Герой #${m.hero_id}`;
    return `<tr>
      <td style="width:72px"><span class="rtag ${won?'w':'l'}">${won?'ПОБЕДА':'ПОРАЖ'}</span></td>
      <td>
        <div class="mhero">
          <img class="mhimg" src="${CDN}/${m.hero_icon||'antimage'}.png" onerror="this.style.opacity=0" alt="">
          <div><div class="mhname">${hname}</div><div class="mdate">${dt(m.start_time)}</div></div>
        </div>
      </td>
      <td class="mkda">${m.kills} / <span class="d">${m.deaths}</span> / ${m.assists}</td>
      <td class="mdur">${fmt(m.duration)}</td>
      <td class="mid">#${String(m.match_id).slice(-7)}</td>
    </tr>`;
  }).join('');
}

function back() {
  data = null;
  document.getElementById('searchPage').style.display = 'flex';
  document.getElementById('profilePage').style.display = 'none';
  document.getElementById('inp').value = '';
  document.getElementById('err').textContent = '';
}

document.getElementById('inp').addEventListener('keydown', e => { if(e.key==='Enter') search(); });
</script>
</body>
</html>
